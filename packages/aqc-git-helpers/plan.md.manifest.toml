# Manifest for: aqc-git-helpers (plan.md in this directory)
# Extraction: single audited pass by the plan's author (NOT 3-agent-isolated).
#
# Gap resolved during extraction (plan said "trailing semantics TBD in impl"):
# changes_affecting_paths matches a change when its path (or old_path) equals
# an entry in `paths` OR starts with "<entry>/" (directory boundary; no
# substring matches).

