[[public_api]]
workspace = "aqc-shared"
crate = "aqc-git-helpers"
types = ["ChangeStatus", "WorktreeChange", "PorcelainOptions", "GitError"]
functions = ["worktree_changes", "is_worktree_clean", "changes_affecting_paths", "dirty_paths"]

[[closed_set]]
workspace = "aqc-shared"
kind = "enum"
crate = "aqc-git-helpers"
type = "ChangeStatus"
variants = [
  "StagedNew", "StagedModified", "StagedDeleted", "StagedRenamed",
  "UnstagedModified", "UnstagedDeleted", "UnstagedRenamed",
  "Untracked", "Ignored",
]

[[closed_set]]
workspace = "aqc-shared"
kind = "enum"
crate = "aqc-git-helpers"
type = "GitError"
variants = ["NotARepository", "GitNotInstalled", "CommandFailed", "ParseError"]

[[struct_shape]]
workspace = "aqc-shared"
crate = "aqc-git-helpers"
type = "WorktreeChange"
required_fields = ["path", "status", "old_path"]

[[struct_shape]]
workspace = "aqc-shared"
crate = "aqc-git-helpers"
type = "PorcelainOptions"
required_fields = ["include_ignored", "include_untracked"]

[[verification_command]]
workspace = "aqc-shared"
name = "git_helpers_tests"
cmd = "cargo test -p aqc-git-helpers --quiet"
expect_exit = 0
