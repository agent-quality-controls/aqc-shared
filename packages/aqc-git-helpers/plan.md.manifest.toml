workspace = "aqc-shared"
path = "packages/aqc-git-helpers/src/lib.rs"

[[tree]]
workspace = "aqc-shared"
path = "packages/aqc-git-helpers/src/git.rs"
note = "The subprocess boundary module: every git invocation lives here (repo convention)."

[[tree]]
workspace = "aqc-shared"
path = "packages/aqc-git-helpers/src/porcelain.rs"

[[tree]]
workspace = "aqc-shared"
path = "packages/aqc-git-helpers/src/status.rs"

[[tree]]
