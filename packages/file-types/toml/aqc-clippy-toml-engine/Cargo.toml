[package]
name = "aqc-clippy-toml-engine"
version.workspace = true
edition.workspace = true
license.workspace = true
rust-version.workspace = true
repository.workspace = true
description = "FileEngine for clippy.toml. Writes msrv, thresholds, and disallowed-methods via toml_edit."
publish = true
readme = "README.md"
keywords = ["aqc", "clippy", "toml", "guardrails"]
categories = ["development-tools", "config", "parser-implementations"]
include = ["src/**", "tests/**", "Cargo.toml", "README.md"]

[package.metadata.docs.rs]
all-features = true

[lints]
workspace = true

[features]
default = ["all"]
all = ["api"]
api = []

[dependencies]
aqc-file-engine-core = { version = "0.3.2", path = "../../../aqc-file-engine-core" }
aqc-toml-engine-core = { version = "0.3.2", path = "../aqc-toml-engine-core" }
globset = "0.4"
toml_edit = "0.25"
