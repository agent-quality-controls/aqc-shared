profile = "library"

allowed_deps = [
  "aqc-clippy-toml-parser-runtime",
  "aqc-clippy-toml-parser-types",
  "serde",
  "toml",
  "ureq",
]

[checks]
garde = false

[[waivers]]
rule = "g3rs-code/large-type-inventory"
subject = "crates/types/src/clippy_toml.rs"
selector = "struct:ClippyToml"
reason = "Generated schema mirror -- matches upstream Clippy config surface 1:1."

[[waivers]]
rule = "g3rs-code/too-many-effective-code-lines"
subject = "crates/types/src/clippy_toml.rs"
selector = "file"
reason = "Generated file; size tracks upstream Clippy config surface and is rewritten end-to-end by the generator."
