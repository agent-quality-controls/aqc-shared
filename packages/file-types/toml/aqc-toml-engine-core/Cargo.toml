[package]
name = "aqc-toml-engine-core"
version.workspace = true
edition.workspace = true
license.workspace = true
rust-version.workspace = true
repository.workspace = true
description = "Shared TOML IO and application helpers for AQC TOML file engines."
publish = true
readme = "README.md"
keywords = ["aqc", "toml", "file-engine", "config"]
categories = ["development-tools", "config", "parser-implementations"]
include = ["src/**", "tests/**", "Cargo.toml", "README.md"]

[package.metadata.docs.rs]
all-features = true

[package.metadata.guardrail3]
shared = true

[lints]
workspace = true

[features]
default = ["all"]
all = ["api"]
api = []

[dependencies]
aqc-file-engine-core = { version = "0.3.2", path = "../../../aqc-file-engine-core" }
toml_edit = "0.25"
