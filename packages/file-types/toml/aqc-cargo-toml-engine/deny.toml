# ============================================================
# LICENSE CHECKING
# ============================================================
[licenses]
allow = [
    "MIT",
    "Apache-2.0",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-DFS-2016",
    "Unicode-3.0",
    "Zlib",
    "CC0-1.0",
    "OpenSSL",
    "BSL-1.0",
    "MPL-2.0",
    "CDLA-Permissive-2.0",
]
confidence-threshold = 0.8

[licenses.private]
ignore = true

# ============================================================
# SECURITY ADVISORY CHECKING
# ============================================================
[advisories]
unmaintained = "workspace"
yanked = "deny"
ignore = []

# ============================================================
# SOURCE RESTRICTIONS
# ============================================================
[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["sparse+https://index.crates.io/"]
allow-git = []
