profile = "library"

allowed_deps = [
  "aqc-file-engine-core",
  "aqc-toml-engine-core",
  "globset",
  "toml_edit",
]

[checks]
toolchain = false
fmt = false
clippy = false
deps = false
test = false
release = false


[[waivers]]
rule = "g3rs-cargo/approved-allow-inventory"
subject = "Cargo.toml"
selector = "clippy:missing_docs_in_private_items"
reason = "Private implementation details are documented at module and public-contract boundaries."

[[waivers]]
rule = "g3rs-cargo/approved-allow-inventory"
subject = "Cargo.toml"
selector = "clippy:module_name_repetitions"
reason = "Canonical public requirement names retain the engine vocabulary."

[[waivers]]
rule = "g3rs-cargo/approved-allow-inventory"
subject = "Cargo.toml"
selector = "clippy:type_complexity"
reason = "Explicit generic requirement contracts preserve their type relationships."

[[waivers]]
rule = "g3rs-cargo/unapproved-allow-entries"
subject = "Cargo.toml"
selector = "clippy:type_complexity"
reason = "Explicit generic requirement contracts preserve their type relationships."

[[waivers]]
rule = "g3rs-cargo/approved-allow-inventory"
subject = "Cargo.toml"
selector = "clippy:excessive_nesting"
reason = "Cargo requirement reconciliation follows the nested structure of manifest sections."

[[waivers]]
rule = "g3rs-cargo/unapproved-allow-entries"
subject = "Cargo.toml"
selector = "clippy:excessive_nesting"
reason = "Cargo requirement reconciliation follows the nested structure of manifest sections."

[[waivers]]
rule = "g3rs-cargo/approved-allow-inventory"
subject = "Cargo.toml"
selector = "clippy:too_many_lines"
reason = "Cargo aggregate reconciliation intentionally covers every managed manifest section in one operation."

[[waivers]]
rule = "g3rs-cargo/unapproved-allow-entries"
subject = "Cargo.toml"
selector = "clippy:too_many_lines"
reason = "Cargo aggregate reconciliation intentionally covers every managed manifest section in one operation."

[[waivers]]
rule = "g3rs-deny/deprecated-advisories"
subject = "deny.toml"
selector = "title:deprecated-advisory-field-unsound"
reason = "This published workspace retains its stricter cargo-deny source shape."

[[waivers]]
rule = "g3rs-deny/advisories-baseline"
subject = "deny.toml"
selector = "title:advisories-unmaintained-has-wrong-value"
reason = "A universal library audits unmaintained dependencies across its complete dependency graph."

[[waivers]]
rule = "g3rs-deny/allow-wildcard-paths"
subject = "deny.toml"
selector = "title:allow-wildcard-paths-must-be-true"
reason = "Published AQC crates forbid wildcard path dependencies."

[[waivers]]
rule = "g3rs-deny/license-allow-baseline"
subject = "deny.toml"
selector = "title:licenses-private-ignore-must-be-true"
reason = "Published AQC crates audit private-package licenses."

[[waivers]]
rule = "g3rs-deny/allow-registry-baseline"
subject = "deny.toml"
selector = "title:canonical-registry-missing"
reason = "The source-shaped cargo-deny configuration uses the canonical Git index registry identity."

[[waivers]]
rule = "g3rs-deny/allow-registry-baseline"
subject = "deny.toml"
selector = "title:unexpected-registry-allowed"
reason = "The source-shaped cargo-deny configuration uses the canonical Git index registry identity."

[[waivers]]
rule = "g3rs-code/public-struct-named-fields"
subject = "src/requirement/cargo_toml/model.rs"
selector = "struct:CargoTomlRequirements"
reason = "Declarative requirement struct; bulk-form field-per-target is the API."

[[waivers]]
rule = "g3rs-code/large-type-inventory"
subject = "src/requirement/cargo_toml/model.rs"
selector = "struct:ResolvedCargoTomlRequirements"
reason = "Resolved Cargo requirement aggregate; field-per-Cargo-section is the public data model."

[[waivers]]
rule = "g3rs-code/public-struct-named-fields"
subject = "src/requirement/targets.rs"
selector = "struct:TargetRequirements"
reason = "Declarative requirement struct for Cargo target tables; field-per-target-kind is the API."

[[waivers]]
rule = "g3rs-code/public-struct-named-fields"
subject = "src/requirement/targets.rs"
selector = "struct:ResolvedTargetRequirements"
reason = "Resolved target-table aggregate returned by merge; fields mirror target sections and are consumed as data."

[[waivers]]
rule = "g3rs-code/public-struct-named-fields"
subject = "src/requirement/dependencies.rs"
selector = "struct:DependencySpec"
reason = "Plain data record mirroring a Cargo.toml dependency entry shape."

[[waivers]]
rule = "g3rs-code/public-struct-named-fields"
subject = "src/requirement/dependencies.rs"
selector = "struct:DependencyScope"
reason = "Declarative dependency table address; named fields are the API."

[[waivers]]
rule = "g3rs-code/public-struct-named-fields"
subject = "src/requirement/dependencies.rs"
selector = "struct:DependencyRequirement"
reason = "Dependency requirement data shape; optional file key plus value is the API."

[[waivers]]
rule = "g3rs-code/public-struct-named-fields"
subject = "src/requirement/dependencies.rs"
selector = "struct:DependencyPackageGlob"
reason = "Plain data record for forbidden dependency package globs."

[[waivers]]
rule = "g3rs-code/public-struct-named-fields"
subject = "src/requirement/features.rs"
selector = "struct:FeatureMembers"
reason = "Plain data record mirroring a Cargo.toml feature member list."

[[waivers]]
rule = "g3rs-code/public-struct-named-fields"
subject = "src/requirement/lints.rs"
selector = "struct:LintSetting"
reason = "Plain data record mirroring a Cargo lint setting entry."

[[waivers]]
rule = "g3rs-code/public-struct-named-fields"
subject = "src/requirement/profiles.rs"
selector = "struct:ProfileRequirements"
reason = "Declarative profile requirement aggregate; named sections are the API."

[[waivers]]
rule = "g3rs-code/public-struct-named-fields"
subject = "src/requirement/profiles.rs"
selector = "struct:ResolvedProfileRequirements"
reason = "Resolved profile requirement aggregate; fields mirror the profile requirement sections."
