profile = "library"

allowed_deps = [
  "aqc-file-engine-core",
  "aqc-text-engine-core",
]

[checks]
toolchain = false
fmt = false
clippy = false
deps = false
test = false
release = false

[[waivers]]
rule = "g3rs-code/public-struct-named-fields"
subject = "src/requirement/model.rs"
selector = "struct:GitHooksRequirements"
reason = "Requirement root wraps the reusable text file requirements for Git hook files."

[[waivers]]
rule = "g3rs-code/public-struct-named-fields"
subject = "src/requirement/model.rs"
selector = "struct:ResolvedGitHooksRequirements"
reason = "Resolved root wraps the reusable text file resolved requirements for Git hook files."
