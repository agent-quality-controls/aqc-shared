profile = "library"

allowed_deps = [
  "aqc-file-engine-core",
]

[checks]
toolchain = false
fmt = false
clippy = false
deps = false
test = false
release = false

[[waivers]]
rule = "g3rs-code/public-struct-named-fields"
subject = "src/requirement/model.rs"
selector = "struct:TextFileRequirements"
reason = "Requirement root mirrors exact and contained text contents."

[[waivers]]
rule = "g3rs-code/public-struct-named-fields"
subject = "src/requirement/model.rs"
selector = "struct:ResolvedTextFileRequirements"
reason = "Resolved root mirrors exact and contained text contents."
