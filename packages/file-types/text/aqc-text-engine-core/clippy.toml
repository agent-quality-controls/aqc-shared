# Pure-layer architecture guardrails.
# Policies, adapters, file engines, and engine cores are data transforms.

disallowed-methods = [
    { path = "std::process::Command::new", reason = "Only the runner executes configured commands." },
    { path = "std::fs::read", reason = "Pure layers receive bytes and data; they do not read files." },
    { path = "std::fs::read_to_string", reason = "Pure layers receive bytes and data; they do not read files." },
    { path = "std::fs::write", reason = "Pure layers return data; they do not write files." },
    { path = "std::env::var", reason = "Pure layers receive configuration as data; they do not inspect process state." },
]
