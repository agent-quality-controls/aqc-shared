profile = "library"

allowed_deps = []

[checks]
toolchain = false
fmt = false
clippy = false
deps = false
test = false
release = false

[[waivers]]
rule = "g3rs-code/public-struct-named-fields"
subject = "src/types.rs"
selector = "struct:Provenance"
reason = "Provenance is a transparent data container; named pub fields are the API."

[[waivers]]
rule = "g3rs-code/public-struct-named-fields"
subject = "src/types.rs"
selector = "struct:MergedAssertion"
reason = "ResolvedRequirement stores collected policy assertions; named pub fields are the API."

[[waivers]]
rule = "g3rs-code/public-struct-named-fields"
subject = "src/types.rs"
selector = "struct:EngineOutput"
reason = "EngineOutput is the engine's return envelope; named pub fields are the API."

[[waivers]]
rule = "g3rs-code/public-struct-named-fields"
subject = "src/types.rs"
selector = "struct:MergeConflict"
reason = "Error type carrying structured data; named pub fields are the API."

[[waivers]]
rule = "g3rs-cargo/approved-allow-inventory"
subject = "Cargo.toml"
selector = "clippy:missing_docs_in_private_items"
reason = "Private merge implementation helpers are documented at their module and public-contract boundaries."

[[waivers]]
rule = "g3rs-cargo/approved-allow-inventory"
subject = "Cargo.toml"
selector = "clippy:module_name_repetitions"
reason = "Canonical public requirement type names retain the file-engine vocabulary even when modules repeat it."

[[waivers]]
rule = "g3rs-cargo/approved-allow-inventory"
subject = "Cargo.toml"
selector = "clippy:type_complexity"
reason = "The explicit generic merge contracts expose required type relationships without hiding them behind aliases."

[[waivers]]
rule = "g3rs-cargo/unapproved-allow-entries"
subject = "Cargo.toml"
selector = "clippy:type_complexity"
reason = "The explicit generic merge contracts expose required type relationships without hiding them behind aliases."

[[waivers]]
rule = "g3rs-deny/deprecated-advisories"
subject = "deny.toml"
selector = "title:deprecated-advisory-field-unsound"
reason = "This package fixture intentionally retains the published cargo-deny source shape until its generator is upgraded."

[[waivers]]
rule = "g3rs-deny/advisories-baseline"
subject = "deny.toml"
selector = "title:advisories-unmaintained-has-wrong-value"
reason = "A universal library audits unmaintained dependencies across its complete dependency graph, not only workspace crates."

[[waivers]]
rule = "g3rs-deny/allow-wildcard-paths"
subject = "deny.toml"
selector = "title:allow-wildcard-paths-must-be-true"
reason = "Published AQC crates forbid wildcard path dependencies rather than permitting them."

[[waivers]]
rule = "g3rs-deny/license-allow-baseline"
subject = "deny.toml"
selector = "title:licenses-private-ignore-must-be-true"
reason = "Published AQC crates audit private-package licenses with the same rules as published dependencies."

[[waivers]]
rule = "g3rs-deny/allow-registry-baseline"
subject = "deny.toml"
selector = "title:canonical-registry-missing"
reason = "The source-shaped cargo-deny configuration uses the canonical Git index registry identity."

[[waivers]]
rule = "g3rs-deny/allow-registry-baseline"
subject = "deny.toml"
selector = "title:unexpected-registry-allowed"
reason = "The source-shaped cargo-deny configuration uses the canonical Git index registry identity."

[[waivers]]
rule = "g3rs-deny/allow-registry-baseline"
subject = "deny.toml"
selector = "title:allow-registry-entry-count-differs-from-baseline"
reason = "The source-shaped cargo-deny configuration uses the canonical Git index registry identity."

[[waivers]]
rule = "g3rs-code/too-many-use-imports"
subject = "src/merge/items.rs"
selector = "top-level-use-imports"
reason = "The item merge module composes the complete shared item vocabulary in one cohesive implementation."

[[waivers]]
rule = "g3rs-code/too-many-use-imports"
subject = "src/merge/mod.rs"
selector = "top-level-use-imports"
reason = "The merge module is the required public facade for the complete universal merge vocabulary."
