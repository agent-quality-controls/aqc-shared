# =============================================================================
# deny.toml -- independent AQC tool workspace
# =============================================================================

[graph]
all-features = true
no-default-features = false

exclude-dev = false
exclude-unpublished = false

[bans]
multiple-versions = "deny"
wildcards = "deny"
allow-wildcard-paths = false
highlight = "all"
multiple-versions-include-dev = true
workspace-default-features = "allow"
external-default-features = "allow"
allow-workspace = false
skip = [
    { name = "thiserror", version = "=1.0.69", reason = "cargo_metadata 0.20 retains cargo-util-schemas on thiserror 1 while preserving Rust 1.85 compatibility" },
    { name = "thiserror-impl", version = "=1.0.69", reason = "Procedural macro paired with the permitted transitive thiserror 1 release" },
]
deny = [
    { name = "anyhow", wrappers = [], reason = "Use typed errors at architecture-tool boundaries" },
    { name = "regex", wrappers = [], reason = "Use syn for structured Rust analysis" },
    { name = "aqc-file-engine-core", wrappers = [], reason = "The universal checker inspects source and must not depend on engine infrastructure" },
    { name = "aqc-toml-engine-core", wrappers = [], reason = "The universal checker must not depend on format infrastructure" },
    { name = "aqc-yaml-engine-core", wrappers = [], reason = "The universal checker must not depend on format infrastructure" },
    { name = "aqc-json-engine-core", wrappers = [], reason = "The universal checker must not depend on format infrastructure" },
]

[bans.workspace-dependencies]
duplicates = "deny"
include-path-dependencies = true
unused = "deny"

[licenses]
allow = [
    "Apache-2.0",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "BSL-1.0",
    "CC0-1.0",
    "CDLA-Permissive-2.0",
    "ISC",
    "MIT",
    "MPL-2.0",
    "OpenSSL",
    "Unicode-3.0",
    "Unicode-DFS-2016",
    "Zlib",
]
confidence-threshold = 0.8
include-dev = true
include-build = true
unused-allowed-license = "allow"
unused-license-exception = "deny"

[licenses.private]
ignore = false

[advisories]
unmaintained = "all"
yanked = "deny"
ignore = []
disable-yank-checking = false
unsound = "all"
maximum-db-staleness = "P90D"
unused-ignored-advisory = "deny"
db-urls = ["https://github.com/RustSec/advisory-db"]

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []
required-git-spec = "rev"
unused-allowed-source = "allow"
