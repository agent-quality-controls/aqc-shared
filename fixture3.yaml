version: 1

features:
  exact-list-differences:
    spec: "specs/exact-list-differences.spec.json"
    suites:
      - "exact-list-differences"
  generic-json-file-engine:
    spec: "specs/generic-json-file-engine.spec.json"
    suites:
      - "generic-json-file-engine"
  shakts-pnpm-aqc:
    spec: "specs/shakts-pnpm-aqc.spec.json"
    suites:
      - "shakts-pnpm-aqc"
  shakts-tsc-aqc:
    spec: "specs/shakts-tsc-aqc.spec.json"
    suites:
      - "shakts-tsc-aqc"

suites:
  exact-list-differences:
    tags:
      - "file-engines"
      - "json"
      - "toml"
      - "yaml"
    fixtures:
      - "fixtures/exact-list-differences/*.json"
    command:
      argv:
        - "python3"
        - "fixtures/scripts/fixture3-exact-list-differences.py"
        - "{fixtures}"
      ok_exit_codes:
        - 0
    storage:
      approved_dir: "fixtures/approved/exact-list-differences"
      received_dir: ".fixture3/exact-list-differences"
      diff_dir: ".fixture3/exact-list-differences"

  generic-json-file-engine:
    tags:
      - "file-engines"
      - "json"
    fixtures:
      - "fixtures/generic-json-file-engine/*.json"
    command:
      argv:
        - "python3"
        - "fixtures/scripts/fixture3-generic-json-file-engine.py"
        - "{fixtures}"
      ok_exit_codes:
        - 0
    storage:
      approved_dir: "fixtures/approved/generic-json-file-engine"
      received_dir: ".fixture3/generic-json-file-engine"
      diff_dir: ".fixture3/generic-json-file-engine"

  shakts-pnpm-aqc:
    tags:
      - "file-engines"
      - "json"
      - "yaml"
    fixtures:
      - "fixtures/shakts-pnpm-aqc/*.json"
