name: requirement-architecture

on:
  pull_request:
  push:

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo install cargo-deny --version 0.19.4 --locked
      - run: cargo install specular --version 0.5.0 --locked
      - run: ./scripts/check-workspaces.sh
