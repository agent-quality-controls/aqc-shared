profile = "library"

allowed_deps = [
  "aqc-file-engine-core",
  "globset",
  "ignore",
  "proc-macro2",
  "syn",
  "tempfile",
  "toml_edit",
]

[checks]
test = false

[[waivers]]
rule = "g3rs-code/public-struct-named-fields"
subject = "packages/aqc-file-engine-core/src/types.rs"
selector = "struct:Provenance"
reason = "Provenance is a transparent data container; named pub fields are the API."

[[waivers]]
rule = "g3rs-code/public-struct-named-fields"
subject = "packages/aqc-file-engine-core/src/types.rs"
selector = "struct:MergedAssertion"
reason = "ResolvedRequirement stores collected policy assertions; named pub fields are the API."

[[waivers]]
rule = "g3rs-code/public-struct-named-fields"
subject = "packages/aqc-file-engine-core/src/types.rs"
selector = "struct:EngineOutput"
reason = "EngineOutput is the engine's return envelope; named pub fields are the API."

[[waivers]]
rule = "g3rs-code/public-struct-named-fields"
subject = "packages/aqc-file-engine-core/src/types.rs"
selector = "struct:MergeConflict"
reason = "Error type carrying structured data; named pub fields are the API."

[[waivers]]
rule = "g3rs-code/public-struct-named-fields"
subject = "packages/file-types/toml/aqc-cargo-toml-engine/src/requirement/cargo_toml/model.rs"
selector = "struct:CargoTomlRequirements"
reason = "Declarative requirement struct; bulk-form field-per-target is the API."

[[waivers]]
rule = "g3rs-code/public-struct-named-fields"
subject = "packages/file-types/toml/aqc-cargo-toml-engine/src/requirement/cargo_toml/model.rs"
selector = "struct:ResolvedCargoTomlRequirements"
reason = "Resolved aggregate returned by merge; fields mirror the requirement sections and are consumed as data."

[[waivers]]
rule = "g3rs-code/large-type-inventory"
subject = "packages/file-types/toml/aqc-cargo-toml-engine/src/requirement/cargo_toml/model.rs"
selector = "struct:ResolvedCargoTomlRequirements"
reason = "Resolved Cargo requirement aggregate; field-per-Cargo-section is the public data model."

[[waivers]]
rule = "g3rs-code/public-struct-named-fields"
subject = "packages/file-types/toml/aqc-cargo-toml-engine/src/requirement/cargo_toml/model.rs"
selector = "struct:DependencyForbiddenGlobConflictBlocks"
reason = "Resolved conflict aggregate returned by merge; fields name the blocked required dependencies and glob requirements."

[[waivers]]
rule = "g3rs-code/public-struct-named-fields"
subject = "packages/file-types/toml/aqc-cargo-toml-engine/src/requirement/targets.rs"
